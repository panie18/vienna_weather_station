# Use real client IP from Cloudflare
map $http_cf_connecting_ip $real_ip {
    default $http_cf_connecting_ip;
    ""      $binary_remote_addr;
}

limit_req_zone  $real_ip zone=api_current:10m rate=120r/m;
limit_req_zone  $real_ip zone=api_general:10m rate=60r/m;
limit_req_zone  $real_ip zone=api_export:10m  rate=10r/m;
limit_conn_zone $real_ip zone=conn_limit:10m;

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name api.treesinvienna.eu _;

    root /var/www/weather;
    index index.html;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' https://developer.apple.com https://upload.wikimedia.org data:; connect-src 'self'; frame-ancestors 'none'" always;

    if ($request_method !~ ^(GET|HEAD|OPTIONS)$) { return 405; }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/weather/export {
        limit_req      zone=api_export burst=5 nodelay;
        limit_conn     conn_limit 3;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header X-Real-IP $real_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30;
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "*" always;
        if ($request_method = OPTIONS) { return 204; }
    }

    location /api/weather/current {
        limit_req      zone=api_current burst=30 nodelay;
        limit_conn     conn_limit 20;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header X-Real-IP $real_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 10;
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "*" always;
        if ($request_method = OPTIONS) { return 204; }
    }

    location /api/weather/ {
        limit_req      zone=api_general burst=20 nodelay;
        limit_conn     conn_limit 10;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header X-Real-IP $real_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30;
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "*" always;
        if ($request_method = OPTIONS) { return 204; }
    }
}
